name: release

# Push a version tag (e.g. v1.2.3) to build self-contained app-images for each
# OS and attach them to a GitHub Release. Each app-image bundles a trimmed JRE,
# so end users need no Java installed.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required to create the Release and upload assets

jobs:
  appimage:
    name: app-image (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
          - os: macos-13
            label: macos-x64
          - os: macos-latest
            label: macos-arm64
          - os: windows-latest
            label: windows-x64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # GITHUB_REF_NAME is read as a shell env var (not ${{ }} interpolated),
      # so a crafted tag name cannot inject into the script.
      - name: Derive version from tag
        id: ver
        shell: bash
        run: |
          v="${GITHUB_REF_NAME#v}"          # v1.2.3 -> 1.2.3
          echo "version=$v"            >> "$GITHUB_OUTPUT"
          echo "appversion=${v%%-*}"   >> "$GITHUB_OUTPUT"   # strip any -rc1 suffix; jpackage wants numeric

      - name: Build uber-jar
        shell: bash
        run: ./mvnw -T1C -B -ntp clean package

      # Untrusted values are passed via env: and referenced as $VARS, never
      # interpolated into the script body.
      - name: Build self-contained app-image
        shell: bash
        env:
          APPVERSION: ${{ steps.ver.outputs.appversion }}
        run: bash package/build-appimage.sh "$APPVERSION"

      - name: Package app-image (unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          LABEL: ${{ matrix.label }}
        run: |
          cd dist
          zip -qr "../nexus-export-${VERSION}-${LABEL}.zip" nexus-export

      - name: Package app-image (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          LABEL: ${{ matrix.label }}
        run: Compress-Archive -Path dist/nexus-export -DestinationPath "nexus-export-$env:VERSION-$env:LABEL.zip"

      - name: Also stage the portable uber-jar (needs Java 21)
        if: matrix.label == 'linux-x64'
        shell: bash
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: cp target/nexus-export.jar "nexus-export-${VERSION}.jar"

      # matrix.label is a trusted literal from this file; the version is matched
      # by the glob's * so it never appears in an action input.
      - name: Attach app-image to the Release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          generate_release_notes: true
          files: nexus-export-*-${{ matrix.label }}.zip

      - name: Attach portable uber-jar to the Release
        if: matrix.label == 'linux-x64'
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          files: nexus-export-*.jar
