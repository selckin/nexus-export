name: build & release

# On any branch push: build the self-contained app-image for every OS and upload
# them as run artifacts (CI verification + downloadable builds).
# On a version tag (vX.Y.Z): additionally publish them to a GitHub Release.
# Each app-image bundles a trimmed JRE, so end users need no Java installed.
# Publishing uses the GitHub CLI only — no third-party actions.
on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'

permissions:
  contents: write   # required to create the Release and upload assets

# Supersede in-progress runs for the same branch, but never cancel a tag's
# release publish.
concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

env:
  GH_TOKEN: ${{ github.token }}
  GH_REPO: ${{ github.repository }}

jobs:
  # Tag builds only: open the Release once up front so the per-OS jobs can upload
  # into it without racing each other to create it.
  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Create the GitHub Release (idempotent)
        env:
          TAG: ${{ github.ref_name }}
        run: |
          gh release view "$TAG" >/dev/null 2>&1 \
            || gh release create "$TAG" --title "$TAG" --generate-notes

  appimage:
    name: app-image (${{ matrix.label }})
    needs: create-release
    # Run on branch push (create-release is skipped) and on tag (it succeeded);
    # skip only if create-release actually failed.
    if: ${{ !failure() && !cancelled() }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
          - os: macos-15-intel
            label: macos-x64
          - os: macos-15
            label: macos-arm64
          - os: windows-latest
            label: windows-x64
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # On a tag, version = tag minus 'v'. On a branch push there is no version,
      # so use a filesystem-safe build id (branch with '/'->'-', plus short SHA).
      # Built-in env vars are read directly (not ${{ }} interpolated) so a crafted
      # ref name cannot inject into the script.
      - name: Derive version
        id: ver
        shell: bash
        run: |
          if [ "$GITHUB_REF_TYPE" = tag ]; then
            v="${GITHUB_REF_NAME#v}"
          else
            v="${GITHUB_REF_NAME//\//-}-${GITHUB_SHA:0:7}"
          fi
          echo "version=$v"          >> "$GITHUB_OUTPUT"
          echo "appversion=${v%%-*}" >> "$GITHUB_OUTPUT"   # macOS-valid only for clean tags; else ignored

      - name: Build uber-jar
        shell: bash
        run: ./mvnw -T1C -B -ntp clean package

      # Untrusted values pass via env: into $VARS, never interpolated into a script body.
      - name: Build self-contained app-image
        shell: bash
        env:
          APPVERSION: ${{ steps.ver.outputs.appversion }}
        run: bash package/build-appimage.sh "$APPVERSION"

      # Publish the app-image as a run artifact on every build. `path: dist`
      # uploads the app-image tree itself (dist holds only nexus-export/ or
      # nexus-export.app), so GitHub's artifact zip IS the app-image — no nested
      # zip. The name carries the version, so the download is
      # nexus-export-<version>-<label>.zip. v7 artifacts are immutable, hence the
      # per-OS unique name.
      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: nexus-export-${{ steps.ver.outputs.version }}-${{ matrix.label }}
          path: dist
          if-no-files-found: error

      # --- Release path: tag builds only ---

      # tar (gzip) on every OS — bsdtar ships as `tar` on the Windows runners and
      # Git Bash provides it too, so one bash step covers all four. Unlike zip, tar
      # preserves the launcher's executable bit on Linux/macOS.
      - name: Package app-image tarball
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          LABEL: ${{ matrix.label }}
        run: |
          cd dist
          # nexus-export* matches the Linux/Windows directory and the macOS .app bundle
          tar -czf "../nexus-export-${VERSION}-${LABEL}.tar.gz" nexus-export*

      - name: Stage the portable uber-jar (needs Java 21)
        if: matrix.label == 'linux-x64' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: cp target/nexus-export.jar "nexus-export-${VERSION}.jar"

      - name: Upload assets to the Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
          LABEL: ${{ matrix.label }}
        run: |
          assets=( nexus-export-*-"$LABEL".tar.gz )
          [ "$LABEL" = linux-x64 ] && assets+=( nexus-export-*.jar )
          gh release upload "$TAG" --clobber "${assets[@]}"
